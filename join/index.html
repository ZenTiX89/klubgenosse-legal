<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klubgenosse — Klub beitreten</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .center { text-align: center; padding: 2rem 1rem; }
    .code-box {
      display: inline-block;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 1.6rem;
      letter-spacing: 0.4rem;
      padding: 0.6rem 1.2rem;
      background: #f5f5f5;
      border-radius: 8px;
      margin: 1rem 0;
    }
    .btn-primary {
      display: inline-block;
      padding: 0.8rem 1.6rem;
      background: #045C21;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      margin: 0.5rem;
    }
    .btn-secondary {
      display: inline-block;
      padding: 0.8rem 1.6rem;
      background: transparent;
      color: #045C21;
      text-decoration: none;
      border: 2px solid #045C21;
      border-radius: 8px;
      font-weight: 600;
      margin: 0.5rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Klubgenosse</h1>
    </header>

    <div class="center">
      <h2>Klub beitreten</h2>
      <p>Beitrittscode:</p>
      <div class="code-box" id="code-display">…</div>
      <p id="status-text">Versuche, die Klubgenosse-App zu öffnen…</p>
      <p id="store-buttons" style="display:none;">
        <a class="btn-primary" id="ios-link" href="#">App Store</a>
        <a class="btn-primary" id="android-link" href="#">Google Play</a>
      </p>
      <p>
        <a class="btn-secondary" id="retry-link" href="#" style="display:none;">App erneut öffnen</a>
      </p>
      <p style="margin-top: 2rem; color: #666; font-size: 0.9rem;">
        Hast du die App noch nicht? Lade sie aus dem Store, melde dich an und gib den Code oben manuell ein.
      </p>
    </div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = (params.get('code') || '').toUpperCase().trim();

      // App-Store-URLs
      // TODO: iOS-App-Store-ID nach Approval hier einsetzen
      var IOS_URL = 'https://apps.apple.com/de/app/klubgenosse/id6760536625';
      var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.klubgenosse.klubgenosse';

      var displayEl = document.getElementById('code-display');
      var statusEl = document.getElementById('status-text');
      var buttonsEl = document.getElementById('store-buttons');
      var iosLink = document.getElementById('ios-link');
      var androidLink = document.getElementById('android-link');
      var retryLink = document.getElementById('retry-link');

      iosLink.href = IOS_URL;
      androidLink.href = ANDROID_URL;

      if (!code) {
        displayEl.textContent = 'Kein Code';
        statusEl.textContent = 'Es wurde kein Beitrittscode mitgegeben.';
        buttonsEl.style.display = 'block';
        return;
      }

      displayEl.textContent = code;

      var ua = navigator.userAgent || navigator.vendor || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua);
      var isAndroid = /android/i.test(ua);

      var deepLink = 'klubgenosse://join?code=' + encodeURIComponent(code);
      retryLink.href = deepLink;

      function showStoreFallback() {
        statusEl.textContent = 'App nicht gefunden? Lade sie hier herunter:';
        buttonsEl.style.display = 'block';
        retryLink.style.display = 'inline-block';
        // Nur den passenden Store-Button zeigen
        if (isIOS) androidLink.style.display = 'none';
        if (isAndroid) iosLink.style.display = 'none';
      }

      if (!isIOS && !isAndroid) {
        // Desktop: nur Stores anzeigen
        statusEl.textContent = 'Öffne den Link auf deinem Smartphone, um direkt in die App zu springen.';
        buttonsEl.style.display = 'block';
        return;
      }

      // 1.5s warten — wenn die App nicht aufploppt, Store-Buttons zeigen
      var fallbackTimer = setTimeout(showStoreFallback, 1500);
      // Wenn die App den Tab in den Hintergrund verdraengt, Timer abbrechen
      window.addEventListener('pagehide', function () { clearTimeout(fallbackTimer); });
      window.addEventListener('blur', function () { clearTimeout(fallbackTimer); });
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) clearTimeout(fallbackTimer);
      });

      // Versuch, die App zu oeffnen
      window.location.href = deepLink;
    })();
  </script>
</body>
</html>
